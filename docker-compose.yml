name: map

x-app-env: &app-env
  env_file: ./.env

services:
  postgres:
    image: postgis/postgis:17-3.5
    restart: unless-stopped
    profiles: ["infra", "full"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 6

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ["infra", "full"]
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  osrm-foot:
    image: osrm/osrm-backend:latest
    restart: unless-stopped
    profiles: ["infra", "full"]
    command: ["osrm-routed", "--algorithm", "mld", "/data/foot/korea.osrm"]
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./osrm-data:/data:ro

  osrm-bicycle:
    image: osrm/osrm-backend:latest
    restart: unless-stopped
    profiles: ["infra", "full"]
    command: ["osrm-routed", "--algorithm", "mld", "/data/bicycle/korea.osrm"]
    ports:
      - "127.0.0.1:5001:5000"
    volumes:
      - ./osrm-data:/data:ro

  user:
    build:
      context: ../map-service-user
    <<: *app-env
    restart: unless-stopped
    profiles: ["backend", "full"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  agent:
    build:
      context: ../map-service-agent
    <<: *app-env
    restart: unless-stopped
    profiles: ["backend", "full"]
    depends_on:
      postgres:
        condition: service_healthy
      hub:
        condition: service_started
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  hub:
    build:
      context: ../map-service-hub
    <<: *app-env
    restart: unless-stopped
    profiles: ["backend", "full"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      osrm-foot:
        condition: service_started
      osrm-bicycle:
        condition: service_started
    ports:
      - "127.0.0.1:8001:8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:

networks:
  default:
    name: map-net
